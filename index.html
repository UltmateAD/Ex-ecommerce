<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyntaxWear - Ecommerce</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components/header.css">
  <link rel="stylesheet" href="/css/components/hero.css">
  <link rel="stylesheet" href="/css/components/product-category-card.css">
  <link rel="stylesheet" href="/css/components/product-grid.css">
  <link rel="stylesheet" href="/css/components/footer.css">
  <link rel="stylesheet" href="/css/quarry.css">
</head>
<body>
  <!-- Conteúdo da homepage -->

  <header class="main-header">
    <div class="logo">
      <img src="/images/logo/logo.png" alt="SyntaxWear Logo">

    </div>
    <nav class="navigation">
      <ul class="nav-links">
        <li><a href="/">Início</a></li>
        <li><a href="/produtos">Produtos</a></li>
        <li><a href="/sobre">Sobre</a></li>
        <li><a href="/contato">Contato</a></li>
      </ul>
    </nav>
    <nav class="user">
      <ul class="nav-links">
        <li><a href="/login"> <img src="/images/icons/login.png" alt="Login"></a></li>
        <li><a href="/carrinho"> <img src="/images/icons/cart.png" alt="Carrinho"></a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-cont">
        <div class="hero-content">
          <h3>Descubra o mundo além do seu horizonte: cada viagem é uma nova história esperando para ser contada.</h3>
        </div>

        <div class="hero-buttons">
          <button class="btn1">Dicas de Viagem</button>
          <button class="btn2">Destinos Incríveis</button>
        </div>
      </div>
    </section>

    <section class="relevant-categories">
      <div class="card acomodacoes">
        <h4>Acomodações</h4>
        
      </div>
      <div class="card rotas">
        <h4>Rotas</h4>
        
      </div>
      </div>
      <div class="card atividades">
        <h4>Atividades</h4>
        
      </div>
      </div>
      <div class="card guia">
        <h4>Guia de Viagem</h4>
        
      </div>
      <div class="card gastronomia">
        <h4>Gastronomia</h4>
        
      </div>
    </section>
  </main>

  <footer class="main-footer">
  </footer>

</body>
</html>
