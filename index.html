<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyntaxWear - Ecommerce</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components/header.css">
  <link rel="stylesheet" href="/css/components/hero.css">
  <link rel="stylesheet" href="/css/components/product-category-card.css">
  <link rel="stylesheet" href="/css/components/product-grid.css">
  <link rel="stylesheet" href="/css/components/footer.css">
  <link rel="stylesheet" href="/css/quarry.css">
</head>
<body>
  <!-- Conteúdo da homepage -->

  <header class="main-header">
    <div class="logo">
      <img src="/images/logo/logo.png" alt="SyntaxWear Logo">

    </div>
    <nav class="navigation">
      <ul class="nav-links">
        <li><a href="/">Início</a></li>
        <li><a href="/produtos">Produtos</a></li>
        <li><a href="/sobre">Sobre</a></li>
        <li><a href="/contato">Contato</a></li>
      </ul>
    </nav>
    <nav class="user">
      <ul class="nav-links">
        <li><a href="/login"> <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></a></li>

        <li><a href="/carrinho"> <svg class="icon" xmlns="http://www.w3.org/2000/svg" "http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" id="shopping-bag"><path d="M19,7H16V6A4,4,0,0,0,8,6V7H5A1,1,0,0,0,4,8V19a3,3,0,0,0,3,3H17a3,3,0,0,0,3-3V8A1,1,0,0,0,19,7ZM10,6a2,2,0,0,1,4,0V7H10Zm8,13a1,1,0,0,1-1,1H7a1,1,0,0,1-1-1V9H8v1a1,1,0,0,0,2,0V9h4v1a1,1,0,0,0,2,0V9h2Z"></path></svg></a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-cont">
        <div class="hero-content">
          <h3>Descubra o mundo além do seu horizonte: cada viagem é uma nova história esperando para ser contada.</h3>
        </div>
        <div class="hero-buttons">
          <button class="btn1">Dicas de Viagem</button>
          <button class="btn2">Destinos Incríveis</button>
        </div>
      </div>
    </section>

    <section class="relevant-categories">
      <div class="card acomodacoes">
        <span class="back">
          <button class="btn-cat">acomodações</button>
        </span> 
      </div>
      <div class="card rotas">
        <span class="back">
          <button class="btn-cat">rotas</button>
        </span>
      </div>
      <div class="card atividades">
        <span class="back">
          <button class="btn-cat">Atividades</button>
        </span>  
      </div>
      <div class="card guia">
        <span class="back">
          <button class="btn-cat">guia de viagens</button>
        </span> 
      </div>
      <div class="card gastronomia">
        <span class="back">
          <button class="btn-cat">Gastronomia</button>
        </span> 
      </div>
    </section>

    <section class="product-grid">
      <div class="destaque card-grid">
        <span class="back">
        <h3 class="texto-destaque">Transforme seus sonhos em destinos  </h3>
        <p class="texto-destaque">Cada viagem é uma nova história esperando para ser contada.</p>
        </span>
      </div>
      <div class="grid-2 card-grid"></div>
      <div class="grid-3 card-grid"></div>
      <div class="grid-4 card-grid"></div>
      <div class="grid-5 card-grid"></div>
      <div class="grid-6 card-grid"></div>
    </section>
  
  </main>

  <footer class="main-footer">
  </footer>

</body>
</html>
